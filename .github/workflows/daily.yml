name: Akhir Zamaan Video Pipeline

on:
  schedule:
    # Tuesday + Friday at 04:00 UTC = 8:00 AM Dubai
    # Friday for Jumu'ah engagement; Tuesday for even mid-week spacing.
    # The ~25-30 min run finishes by ~8:30 AM Dubai, leaving the morning to
    # download the bashupload link and upload to YouTube manually.
    - cron: '0 4 * * 2,5'
  workflow_dispatch:       # manual trigger

permissions:
  contents: write          # so we can commit published.json back

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      # Ollama runs ON the runner (installed below) and proxies cloud-routed
      # models to ollama.com using the auth keys restored from secrets.
      # Hardcoded to localhost so a stale OLLAMA_HOST secret can't break it.
      OLLAMA_HOST: http://localhost:11434
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gpt-oss:120b-cloud' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      IMAGE_CONCURRENCY: ${{ vars.IMAGE_CONCURRENCY || '6' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      VOICE_NAME: ${{ vars.VOICE_NAME || 'en-GB-RyanNeural' }}
      RECITER_ID: ${{ vars.RECITER_ID || 'Alafasy_128kbps' }}
      VIDEO_DURATION_MIN: ${{ vars.VIDEO_DURATION_MIN || '15' }}
      VIDEO_DURATION_MAX: ${{ vars.VIDEO_DURATION_MAX || '20' }}
      AUTO_TOPIC_REFILL: ${{ vars.AUTO_TOPIC_REFILL || 'true' }}
      TOPIC_REFILL_THRESHOLD: ${{ vars.TOPIC_REFILL_THRESHOLD || '20' }}
      KOKORO_VOICE: ${{ vars.KOKORO_VOICE || 'bm_lewis' }}
      KOKORO_SPEED: ${{ vars.KOKORO_SPEED || '0.95' }}
      KOKORO_LANG: ${{ vars.KOKORO_LANG || 'en-gb' }}
      CHANNEL_NAME: Akhir Zamaan
      CHANNEL_HANDLE: '@akhirzamaan'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Ollama (managed by systemd)
        run: |
          set -euo pipefail
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version
          # The install script enables + starts a systemd service that runs
          # as the `ollama` system user. We let systemd manage it across the
          # whole job — it auto-restarts on crash and survives the long
          # Python/Kokoro/npm steps that come later.

      - name: Install Ollama Cloud auth keys into systemd service config
        env:
          OLLAMA_KEY_PRIVATE: ${{ secrets.OLLAMA_KEY_PRIVATE }}
          OLLAMA_KEY_PUBLIC: ${{ secrets.OLLAMA_KEY_PUBLIC }}
        run: |
          set -euo pipefail
          if [ -z "${OLLAMA_KEY_PRIVATE:-}" ] || [ -z "${OLLAMA_KEY_PUBLIC:-}" ]; then
            echo "::error::OLLAMA_KEY_PRIVATE / OLLAMA_KEY_PUBLIC secrets not set."
            echo "Copy ~/.ollama/id_ed25519 (and .pub) from your laptop into repo Secrets."
            exit 1
          fi
          # systemd ollama runs as the `ollama` system user. Its home (and
          # therefore where it looks for cloud auth keys) is /usr/share/ollama.
          # Putting keys at $HOME/.ollama/ would never be seen by the daemon.
          OLLAMA_HOME="/usr/share/ollama/.ollama"
          sudo mkdir -p "$OLLAMA_HOME"
          # Use a temp file to avoid sudo-eval shenanigans with the secret value
          umask 077
          printf '%s' "$OLLAMA_KEY_PRIVATE" > /tmp/ollama_key_private
          printf '%s' "$OLLAMA_KEY_PUBLIC" > /tmp/ollama_key_public
          sudo mv /tmp/ollama_key_private "$OLLAMA_HOME/id_ed25519"
          sudo mv /tmp/ollama_key_public "$OLLAMA_HOME/id_ed25519.pub"
          sudo chown -R ollama:ollama "$OLLAMA_HOME"
          sudo chmod 600 "$OLLAMA_HOME/id_ed25519"
          sudo chmod 644 "$OLLAMA_HOME/id_ed25519.pub"
          echo "Keys installed:"
          sudo ls -la "$OLLAMA_HOME/"
          echo "Restarting systemd ollama service to load new keys..."
          sudo systemctl restart ollama
          echo "Waiting for Ollama to become reachable on localhost:11434..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready (took ${i}s)"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            echo "::error::Ollama did not respond within 30s after key install"
            sudo systemctl status ollama --no-pager || true
            sudo journalctl -u ollama --no-pager -n 80 || true
            exit 1
          fi

      - name: Register cloud model
        run: |
          set -euo pipefail
          echo "Registering ${OLLAMA_MODEL} (cloud-routed — metadata only, no large download)..."
          ollama pull "${OLLAMA_MODEL}"
          ollama list

      - name: Setup Python 3.11 (for Kokoro TTS)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system packages (FFmpeg + espeak-ng + fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng fonts-liberation fonts-dejavu

      - name: Install Python deps for Kokoro TTS
        run: pip install --quiet -r requirements.txt

      - name: Cache Kokoro model files (~340 MB)
        id: kokoro-cache
        uses: actions/cache@v4
        with:
          path: assets/kokoro
          key: kokoro-model-v1.0

      - name: Download Kokoro model files (cache miss only)
        if: steps.kokoro-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p assets/kokoro
          echo "Downloading kokoro-v1.0.onnx (~325 MB)..."
          curl -L --fail --retry 3 --retry-delay 5 \
            -o assets/kokoro/kokoro-v1.0.onnx \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx
          echo "Downloading voices-v1.0.bin (~28 MB)..."
          curl -L --fail --retry 3 --retry-delay 5 \
            -o assets/kokoro/voices-v1.0.bin \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin
          ls -lh assets/kokoro/

      - name: Install deps
        run: npm install

      - name: Bootstrap Quran + hadith data
        run: npm run bootstrap-data

      - name: Verify Ollama is still healthy before pipeline
        run: |
          set -euo pipefail
          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            echo "::error::Ollama died between setup and pipeline run"
            sudo systemctl status ollama --no-pager || true
            sudo journalctl -u ollama --no-pager -n 100 || true
            echo "Attempting to restart ollama..."
            sudo systemctl restart ollama || true
            sleep 5
            curl -sf http://localhost:11434/api/tags > /dev/null && echo "Recovered after restart" || (echo "::error::Could not recover" && exit 1)
          fi
          echo "Ollama healthy. Registered models:"
          ollama list

      - name: Run pipeline
        run: npm start

      - name: Locate generated video
        id: locate
        run: |
          set -euo pipefail
          LATEST_DIR=$(ls -dt output/*/ 2>/dev/null | head -1 || true)
          if [ -z "${LATEST_DIR}" ]; then
            echo "::error::No output directory found under output/"
            exit 1
          fi
          VIDEO_PATH="${LATEST_DIR}final.mp4"
          if [ ! -f "${VIDEO_PATH}" ]; then
            echo "::error::final.mp4 not found at ${VIDEO_PATH}"
            exit 1
          fi
          TITLE=""
          if [ -f "${LATEST_DIR}metadata.json" ]; then
            TITLE=$(node -e "try{const m=require('./${LATEST_DIR}metadata.json');process.stdout.write(m.title||'')}catch(e){}")
          fi
          SIZE_MB=$(du -m "${VIDEO_PATH}" | cut -f1)
          echo "video_path=${VIDEO_PATH}" >> "$GITHUB_OUTPUT"
          echo "output_dir=${LATEST_DIR}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "size_mb=${SIZE_MB}" >> "$GITHUB_OUTPUT"
          echo "Located: ${VIDEO_PATH} (${SIZE_MB} MB) — ${TITLE}"

      - name: Upload final video to bashupload.com
        id: bashupload
        run: |
          set -euo pipefail
          VIDEO_PATH="${{ steps.locate.outputs.video_path }}"
          echo "Uploading ${VIDEO_PATH} to bashupload.com..."
          # bashupload returns plain text including a 'wget https://bashupload.com/...' line
          RESPONSE=$(curl -sS --max-time 1800 -T "${VIDEO_PATH}" https://bashupload.com/)
          echo "--- bashupload response ---"
          echo "${RESPONSE}"
          echo "--- end response ---"
          DOWNLOAD_URL=$(echo "${RESPONSE}" | grep -oE 'https://bashupload\.com/[^[:space:]]+' | head -1 || true)
          if [ -z "${DOWNLOAD_URL}" ]; then
            echo "::error::Failed to extract download URL from bashupload response"
            exit 1
          fi
          echo "download_url=${DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "Download URL: ${DOWNLOAD_URL}"

      - name: Deliver everything to Telegram (video link + thumbnail + captions + metadata)
        if: steps.bashupload.outputs.download_url != ''
        env:
          DOWNLOAD_URL: ${{ steps.bashupload.outputs.download_url }}
          TITLE: ${{ steps.locate.outputs.title }}
          SIZE_MB: ${{ steps.locate.outputs.size_mb }}
          OUTPUT_DIR: ${{ steps.locate.outputs.output_dir }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping all Telegram delivery"
            exit 0
          fi

          TG="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          THUMB_PATH="${OUTPUT_DIR}thumbnail.jpg"
          SRT_PATH="${OUTPUT_DIR}captions.srt"
          META_PATH="${OUTPUT_DIR}metadata.json"

          # 1) Headline message: video download link
          echo "→ Telegram: sending video link..."
          MSG="🎬 Akhir Zamaan Video Ready"$'\n\n'"📥 Download: ${DOWNLOAD_URL}"
          if [ -n "${TITLE}" ]; then
            MSG="${MSG}"$'\n\n'"📝 Title: ${TITLE}"$'\n'"💾 Size: ${SIZE_MB} MB"
          fi
          curl -sS -X POST "${TG}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=false" \
            -o /dev/null -w "  sendMessage HTTP %{http_code}\n"

          # 2) Thumbnail (sent as a photo so it previews in the chat)
          if [ -f "${THUMB_PATH}" ]; then
            echo "→ Telegram: sending thumbnail..."
            curl -sS -X POST "${TG}/sendPhoto" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "photo=@${THUMB_PATH}" \
              -F "caption=🖼 Thumbnail (1280×720) — save and use as YouTube custom thumbnail" \
              -o /dev/null -w "  sendPhoto HTTP %{http_code}\n"
          else
            echo "::warning::thumbnail.jpg not found at ${THUMB_PATH} — skipping"
          fi

          # 3) Captions file (.srt) — sent as document so it's downloadable
          if [ -f "${SRT_PATH}" ]; then
            echo "→ Telegram: sending captions.srt..."
            curl -sS -X POST "${TG}/sendDocument" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "document=@${SRT_PATH}" \
              -F "caption=📑 Captions (.srt) — upload under YouTube → Subtitles → Add language → English" \
              -o /dev/null -w "  sendDocument HTTP %{http_code}\n"
          else
            echo "::warning::captions.srt not found at ${SRT_PATH} — skipping"
          fi

          # 4) YouTube metadata text — title, description, tags, chapters — copy/paste ready
          if [ -f "${META_PATH}" ]; then
            echo "→ Telegram: sending YouTube about-section..."
            META_TITLE=$(jq -r '.title // ""' "${META_PATH}")
            META_DESC=$(jq -r '.description // ""' "${META_PATH}")
            META_TAGS=$(jq -r '(.tags // []) | join(", ")' "${META_PATH}")
            META_CHAPTERS=$(jq -r '(.chapters // []) | map("\(.time) — \(.label)") | join("\n")' "${META_PATH}")

            META_MSG="📋 YouTube Upload Form (copy/paste each section)"$'\n\n'
            META_MSG="${META_MSG}━━━ TITLE ━━━"$'\n'"${META_TITLE}"$'\n\n'
            META_MSG="${META_MSG}━━━ DESCRIPTION ━━━"$'\n'"${META_DESC}"$'\n\n'
            if [ -n "${META_CHAPTERS}" ]; then
              META_MSG="${META_MSG}━━━ CHAPTERS (already in description, here for reference) ━━━"$'\n'"${META_CHAPTERS}"$'\n\n'
            fi
            META_MSG="${META_MSG}━━━ TAGS ━━━"$'\n'"${META_TAGS}"

            # Telegram's hard limit on sendMessage text is 4096 chars. If our
            # full metadata exceeds that, send the description as a .txt file
            # instead so nothing is silently truncated.
            MSG_BYTES=$(printf '%s' "${META_MSG}" | wc -c)
            if [ "${MSG_BYTES}" -le 4000 ]; then
              curl -sS -X POST "${TG}/sendMessage" \
                --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=${META_MSG}" \
                --data-urlencode "disable_web_page_preview=true" \
                -o /dev/null -w "  metadata sendMessage HTTP %{http_code}\n"
            else
              echo "  metadata is ${MSG_BYTES} bytes (>4000) — sending as .txt document instead"
              META_TXT="${OUTPUT_DIR}youtube-upload-form.txt"
              printf '%s' "${META_MSG}" > "${META_TXT}"
              curl -sS -X POST "${TG}/sendDocument" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "document=@${META_TXT}" \
                -F "caption=📋 YouTube upload form (title + description + tags + chapters)" \
                -o /dev/null -w "  metadata sendDocument HTTP %{http_code}\n"
            fi
          else
            echo "::warning::metadata.json not found at ${META_PATH} — skipping about-section"
          fi

          echo "✓ Telegram delivery complete"

      - name: Commit published.json + topics-queue.json
        if: always()
        run: |
          git config user.name "akhir-zamaan-bot"
          git config user.email "bot@akhirzamaan.local"
          git add published.json topics-queue.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily pipeline state [skip ci]"
            git push
          fi

      - name: Upload output artifacts (last run)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output-${{ github.run_id }}
          path: |
            output/**/final.mp4
            output/**/thumbnail.jpg
            output/**/captions.srt
            output/**/script.json
            output/**/visual-plan.json
            output/**/metadata.json
            output/**/delivery.json
          retention-days: 14
          if-no-files-found: ignore
