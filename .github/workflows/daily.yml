name: Akhir Zamaan Video Pipeline

on:
  schedule:
    # Tuesday + Friday at 04:00 UTC = 8:00 AM Dubai
    # Friday for Jumu'ah engagement; Tuesday for even mid-week spacing.
    # The ~25-30 min run finishes by ~8:30 AM Dubai, leaving the morning to
    # download the bashupload link and upload to YouTube manually.
    - cron: '0 4 * * 2,5'
  workflow_dispatch:       # manual trigger

permissions:
  contents: write          # so we can commit published.json back

jobs:
  publish:
    runs-on: ubuntu-latest
    # Set to the GitHub Actions free-tier maximum (6 hours). The pipeline
    # normally finishes in ~2.5h; this just removes the wall-clock anxiety.
    # Actual billed minutes equal actual run time, not the timeout cap —
    # so 360 here costs the same as 120 if the run still completes in 2.5h.
    timeout-minutes: 360

    env:
      # Ollama runs ON the runner (installed below) and proxies cloud-routed
      # models to ollama.com using the auth keys restored from secrets.
      # Hardcoded to localhost so a stale OLLAMA_HOST secret can't break it.
      OLLAMA_HOST: http://localhost:11434
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gpt-oss:120b-cloud' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      IMAGE_CONCURRENCY: ${{ vars.IMAGE_CONCURRENCY || '3' }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      VOICE_NAME: ${{ vars.VOICE_NAME || 'en-GB-RyanNeural' }}
      RECITER_ID: ${{ vars.RECITER_ID || 'Alafasy_128kbps' }}
      VIDEO_DURATION_MIN: ${{ vars.VIDEO_DURATION_MIN || '15' }}
      VIDEO_DURATION_MAX: ${{ vars.VIDEO_DURATION_MAX || '20' }}
      AUTO_TOPIC_REFILL: ${{ vars.AUTO_TOPIC_REFILL || 'true' }}
      TOPIC_REFILL_THRESHOLD: ${{ vars.TOPIC_REFILL_THRESHOLD || '20' }}
      KOKORO_VOICE: ${{ vars.KOKORO_VOICE || 'bm_lewis' }}
      KOKORO_SPEED: ${{ vars.KOKORO_SPEED || '0.82' }}
      KOKORO_LANG: ${{ vars.KOKORO_LANG || 'en-gb' }}
      WHISPER_MODEL: ${{ vars.WHISPER_MODEL || 'base.en' }}
      WHISPER_ALIGNMENT: ${{ vars.WHISPER_ALIGNMENT || 'true' }}
      CHANNEL_NAME: Akhir Zamaan
      CHANNEL_HANDLE: '@akhirzamaan'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Ollama (managed by systemd)
        run: |
          set -euo pipefail
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version
          # The install script enables + starts a systemd service that runs
          # as the `ollama` system user. We let systemd manage it across the
          # whole job — it auto-restarts on crash and survives the long
          # Python/Kokoro/npm steps that come later.

      - name: Install Ollama Cloud auth keys into systemd service config
        env:
          OLLAMA_KEY_PRIVATE: ${{ secrets.OLLAMA_KEY_PRIVATE }}
          OLLAMA_KEY_PUBLIC: ${{ secrets.OLLAMA_KEY_PUBLIC }}
        run: |
          set -euo pipefail
          if [ -z "${OLLAMA_KEY_PRIVATE:-}" ] || [ -z "${OLLAMA_KEY_PUBLIC:-}" ]; then
            echo "::error::OLLAMA_KEY_PRIVATE / OLLAMA_KEY_PUBLIC secrets not set."
            echo "Copy ~/.ollama/id_ed25519 (and .pub) from your laptop into repo Secrets."
            exit 1
          fi
          # systemd ollama runs as the `ollama` system user. Its home (and
          # therefore where it looks for cloud auth keys) is /usr/share/ollama.
          # Putting keys at $HOME/.ollama/ would never be seen by the daemon.
          OLLAMA_HOME="/usr/share/ollama/.ollama"
          sudo mkdir -p "$OLLAMA_HOME"
          # Use a temp file to avoid sudo-eval shenanigans with the secret value
          umask 077
          printf '%s' "$OLLAMA_KEY_PRIVATE" > /tmp/ollama_key_private
          printf '%s' "$OLLAMA_KEY_PUBLIC" > /tmp/ollama_key_public
          sudo mv /tmp/ollama_key_private "$OLLAMA_HOME/id_ed25519"
          sudo mv /tmp/ollama_key_public "$OLLAMA_HOME/id_ed25519.pub"
          sudo chown -R ollama:ollama "$OLLAMA_HOME"
          sudo chmod 600 "$OLLAMA_HOME/id_ed25519"
          sudo chmod 644 "$OLLAMA_HOME/id_ed25519.pub"
          echo "Keys installed:"
          sudo ls -la "$OLLAMA_HOME/"
          echo "Restarting systemd ollama service to load new keys..."
          sudo systemctl restart ollama
          echo "Waiting for Ollama to become reachable on localhost:11434..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready (took ${i}s)"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            echo "::error::Ollama did not respond within 30s after key install"
            sudo systemctl status ollama --no-pager || true
            sudo journalctl -u ollama --no-pager -n 80 || true
            exit 1
          fi

      - name: Register cloud model
        run: |
          set -euo pipefail
          echo "Registering ${OLLAMA_MODEL} (cloud-routed — metadata only, no large download)..."
          ollama pull "${OLLAMA_MODEL}"
          ollama list

      - name: Verify Cloudflare API token (no secrets printed)
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — image generation will fall back to Pollinations only"
            exit 0
          fi
          # Cloudflare's official endpoint for testing tokens. Returns
          # the token's status, scopes, and expiry. Never echoes the
          # token itself — only the response body.
          echo "→ Calling Cloudflare /user/tokens/verify ..."
          RESP=$(curl -sS -w '\n__HTTP_CODE__:%{http_code}' \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          HTTP_CODE=$(echo "$RESP" | grep '__HTTP_CODE__:' | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v '__HTTP_CODE__:')
          echo "  HTTP ${HTTP_CODE}"
          echo "  Response: ${BODY}"
          # Diagnostic info about token format (no token chars revealed)
          TOK_LEN=$(printf %s "${CLOUDFLARE_API_TOKEN}" | wc -c)
          TOK_TRIMMED_LEN=$(printf %s "${CLOUDFLARE_API_TOKEN}" | tr -d '[:space:]' | wc -c)
          echo "  Token length: ${TOK_LEN} chars (after stripping all whitespace: ${TOK_TRIMMED_LEN})"
          if [ "${TOK_LEN}" != "${TOK_TRIMMED_LEN}" ]; then
            echo "  ⚠ Token contains whitespace — code .trim()s it but cleaner to fix in Secrets"
          fi
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::Cloudflare rejected the token (HTTP ${HTTP_CODE}). Re-create the token in Cloudflare → My Profile → API Tokens, then update the GitHub Secret."
            exit 1
          fi
          STATUS=$(echo "${BODY}" | grep -oE '"status"[[:space:]]*:[[:space:]]*"[^"]*"' | head -1 | sed 's/.*"\([^"]*\)"$/\1/')
          if [ "${STATUS}" != "active" ]; then
            echo "::error::Token responded but status is '${STATUS}' (expected 'active'). Check expiry or revocation."
            exit 1
          fi
          echo "  ✓ Token is active and valid for Cloudflare API."

      - name: Setup Python 3.11 (for Kokoro TTS)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system packages (FFmpeg + espeak-ng + fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng fonts-liberation fonts-dejavu fonts-roboto
          # Refresh the fontconfig cache so FFmpeg's libass can find Roboto Condensed
          fc-cache -fv > /dev/null 2>&1 || true

      - name: Install Python deps for Kokoro TTS
        run: pip install --quiet -r requirements.txt

      - name: Cache Kokoro model files (~340 MB)
        id: kokoro-cache
        uses: actions/cache@v4
        with:
          path: assets/kokoro
          key: kokoro-model-v1.0

      - name: Cache Whisper model (~75 MB, base.en for caption alignment)
        id: whisper-cache
        uses: actions/cache@v4
        with:
          # faster-whisper downloads models into ~/.cache/huggingface by default
          path: ~/.cache/huggingface
          key: whisper-model-base-en-v1

      - name: Download Kokoro model files (cache miss only)
        if: steps.kokoro-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p assets/kokoro
          echo "Downloading kokoro-v1.0.onnx (~325 MB)..."
          curl -L --fail --retry 3 --retry-delay 5 \
            -o assets/kokoro/kokoro-v1.0.onnx \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx
          echo "Downloading voices-v1.0.bin (~28 MB)..."
          curl -L --fail --retry 3 --retry-delay 5 \
            -o assets/kokoro/voices-v1.0.bin \
            https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin
          ls -lh assets/kokoro/

      - name: Install deps
        run: npm install

      - name: Bootstrap Quran + hadith data
        run: npm run bootstrap-data

      - name: Verify Ollama is still healthy before pipeline
        run: |
          set -euo pipefail
          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            echo "::error::Ollama died between setup and pipeline run"
            sudo systemctl status ollama --no-pager || true
            sudo journalctl -u ollama --no-pager -n 100 || true
            echo "Attempting to restart ollama..."
            sudo systemctl restart ollama || true
            sleep 5
            curl -sf http://localhost:11434/api/tags > /dev/null && echo "Recovered after restart" || (echo "::error::Could not recover" && exit 1)
          fi
          echo "Ollama healthy. Registered models:"
          ollama list

      - name: Run pipeline
        run: npm start

      - name: Locate generated video
        id: locate
        run: |
          set -euo pipefail
          LATEST_DIR=$(ls -dt output/*/ 2>/dev/null | head -1 || true)
          if [ -z "${LATEST_DIR}" ]; then
            echo "::error::No output directory found under output/"
            exit 1
          fi
          VIDEO_PATH="${LATEST_DIR}final.mp4"
          if [ ! -f "${VIDEO_PATH}" ]; then
            echo "::error::final.mp4 not found at ${VIDEO_PATH}"
            exit 1
          fi
          TITLE=""
          if [ -f "${LATEST_DIR}metadata.json" ]; then
            TITLE=$(node -e "try{const m=require('./${LATEST_DIR}metadata.json');process.stdout.write(m.title||'')}catch(e){}")
          fi
          SIZE_MB=$(du -m "${VIDEO_PATH}" | cut -f1)
          echo "video_path=${VIDEO_PATH}" >> "$GITHUB_OUTPUT"
          echo "output_dir=${LATEST_DIR}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "size_mb=${SIZE_MB}" >> "$GITHUB_OUTPUT"
          echo "Located: ${VIDEO_PATH} (${SIZE_MB} MB) — ${TITLE}"

      - name: Upload final video (Cloudflare R2 primary, catbox + 0x0.st fallbacks)
        id: bashupload
        env:
          # Map R2 secrets to AWS-compatible env vars so the aws CLI picks them up
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
        run: |
          set -euo pipefail
          VIDEO_PATH="${{ steps.locate.outputs.video_path }}"
          OUTPUT_DIR="${{ steps.locate.outputs.output_dir }}"
          DOWNLOAD_URL=""
          SIZE_BYTES=$(stat -c%s "${VIDEO_PATH}")
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))

          # Build a clean object key from the timestamped output folder name
          # e.g. "20260514_0026_why-modern-life-feels-so-empty/final.mp4"
          SLUG=$(basename "${OUTPUT_DIR%/}")
          OBJECT_KEY="${SLUG}/final.mp4"
          echo "Uploading ${VIDEO_PATH} (${SIZE_MB} MB) as ${OBJECT_KEY}..."

          # Cloudflare R2 PRIMARY — operator's own S3-compatible storage.
          # Reliable because they control the account and credentials, not
          # dependent on flaky free anonymous endpoints. 10 GB free, zero
          # egress fees, files persist until deleted. Uses the AWS CLI
          # which speaks S3 natively against R2's S3-compatible endpoint.
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${R2_BUCKET_NAME:-}" ] && [ -n "${R2_ENDPOINT:-}" ] && [ -n "${R2_PUBLIC_DOMAIN:-}" ]; then
            echo "→ Uploading to Cloudflare R2 (s3://${R2_BUCKET_NAME}/${OBJECT_KEY})..."
            # AWS CLI v1 installs in ~5 sec via pip (Python is already set up
            # for Kokoro). v1 is fine for S3 operations including R2.
            pip install --quiet awscli >/dev/null 2>&1 || true
            if aws s3 cp "${VIDEO_PATH}" "s3://${R2_BUCKET_NAME}/${OBJECT_KEY}" \
                --endpoint-url "${R2_ENDPOINT}" \
                --no-progress 2>&1; then
              # Strip trailing slash on public domain if present, then build URL
              DOMAIN="${R2_PUBLIC_DOMAIN%/}"
              DOWNLOAD_URL="${DOMAIN}/${OBJECT_KEY}"
              echo "  ✓ R2 succeeded: ${DOWNLOAD_URL}"
            else
              echo "  ✗ R2 upload failed — falling through to anonymous hosts"
            fi
          else
            echo "→ R2 not fully configured (missing one of: R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET_NAME, R2_ENDPOINT, R2_PUBLIC_DOMAIN) — using anonymous fallbacks"
          fi

          # catbox.moe fallback: 200 MB cap, files persist indefinitely.
          # Anonymous endpoint has been throttled lately but still worth trying.
          if [ -z "${DOWNLOAD_URL}" ] && [ "${SIZE_MB}" -le 200 ]; then
            echo "→ Falling back to catbox.moe (${SIZE_MB} MB)..."
            if RESPONSE=$(curl -sS --fail --max-time 1800 \
                -F "reqtype=fileupload" \
                -F "fileToUpload=@${VIDEO_PATH}" \
                https://catbox.moe/user/api.php 2>&1); then
              CANDIDATE=$(echo "${RESPONSE}" | grep -oE 'https?://files\.catbox\.moe/[^[:space:]]+' | head -1 || true)
              if [ -n "${CANDIDATE}" ]; then
                DOWNLOAD_URL="${CANDIDATE}"
                echo "  ✓ catbox.moe succeeded: ${DOWNLOAD_URL}"
              else
                echo "  ✗ catbox.moe gave no URL. Response: ${RESPONSE}"
              fi
            else
              echo "  ✗ catbox.moe upload failed: ${RESPONSE}"
            fi
          elif [ -z "${DOWNLOAD_URL}" ]; then
            echo "→ Skipping catbox.moe (file ${SIZE_MB} MB > 200 MB cap)"
          fi

          # 0x0.st last-resort fallback.
          if [ -z "${DOWNLOAD_URL}" ]; then
            echo "→ Falling back to 0x0.st..."
            if RESPONSE=$(curl -sS --fail --max-time 1800 \
                -H "User-Agent: AkhirZamaanBot/1.0 (+https://github.com/${{ github.repository }})" \
                -F "file=@${VIDEO_PATH}" \
                https://0x0.st 2>&1); then
              CANDIDATE=$(echo "${RESPONSE}" | grep -oE 'https?://0x0\.st/[^[:space:]]+' | head -1 || true)
              if [ -n "${CANDIDATE}" ]; then
                DOWNLOAD_URL="${CANDIDATE}"
                echo "  ✓ 0x0.st succeeded: ${DOWNLOAD_URL}"
              else
                echo "  ✗ 0x0.st gave no URL. Response: ${RESPONSE}"
              fi
            else
              echo "  ✗ 0x0.st upload failed: ${RESPONSE}"
            fi
          fi

          if [ -z "${DOWNLOAD_URL}" ]; then
            echo "::error::All upload providers failed. Video is still in workflow artifacts as a backup."
            exit 1
          fi

          echo "download_url=${DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "Final download URL: ${DOWNLOAD_URL}"

      - name: Deliver to Telegram (download link + plain-text captions)
        if: steps.bashupload.outputs.download_url != ''
        env:
          DOWNLOAD_URL: ${{ steps.bashupload.outputs.download_url }}
          OUTPUT_DIR: ${{ steps.locate.outputs.output_dir }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping Telegram delivery"
            exit 0
          fi

          TG="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          SCRIPT_TXT_PATH="${OUTPUT_DIR}script.txt"

          # 1) Download link — single message, just the link
          echo "→ Telegram: sending download link..."
          MSG="🎬 Akhir Zamaan video ready"$'\n\n'"${DOWNLOAD_URL}"
          curl -sS -X POST "${TG}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=false" \
            -o /dev/null -w "  sendMessage HTTP %{http_code}\n"

          # 2) Plain-text captions (script.txt) as a downloadable document
          if [ -f "${SCRIPT_TXT_PATH}" ]; then
            echo "→ Telegram: sending script.txt (plain-text captions)..."
            curl -sS -X POST "${TG}/sendDocument" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "document=@${SCRIPT_TXT_PATH}" \
              -F "caption=📝 Full captions (plain text, no timing)" \
              -o /dev/null -w "  sendDocument HTTP %{http_code}\n"
          else
            echo "::warning::script.txt not found at ${SCRIPT_TXT_PATH} — skipping captions"
          fi

          echo "✓ Telegram delivery complete"

      - name: Commit published.json + topics-queue.json
        if: always()
        run: |
          git config user.name "akhir-zamaan-bot"
          git config user.email "bot@akhirzamaan.local"
          git add published.json topics-queue.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily pipeline state [skip ci]"
            git push
          fi

      - name: Upload output artifacts (last run)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output-${{ github.run_id }}
          path: |
            output/**/final.mp4
            output/**/thumbnail.jpg
            output/**/captions.srt
            output/**/script.json
            output/**/script.txt
            output/**/visual-plan.json
            output/**/metadata.json
            output/**/delivery.json
          retention-days: 14
          if-no-files-found: ignore
